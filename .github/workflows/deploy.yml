name: "CI/CD Deployment"

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    name: "Build and Deploy"
    runs-on: ubuntu-latest
    env:
      AWS_REGION: "us-east-1"
      PROJECT_NAME: "west"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Get ECR Repository URL
        id: ecr_info
        run: |
          REPO_URL=$(aws ecr describe-repositories --repository-names ${PROJECT_NAME}-app --query 'repositories[0].repositoryUrl' --output text)
          echo "repo_url=$REPO_URL" >> $GITHUB_OUTPUT

      - name: Set up QEMU (for ARM64 build)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/build-push-action@v5
        with:
          # Just initializing buildx
          dry-run: true

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          platforms: linux/arm64
          push: true
          tags: ${{ steps.ecr_info.outputs.repo_url }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Force ECS Service Update
        run: |
          aws ecs update-service --cluster $PROJECT_NAME-cluster --service $PROJECT_NAME-service --force-new-deployment --region $AWS_REGION
